<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #0a66c2;
      --primary-hover: #084f96;
      --disabled: #d1d5db;
      --success: #15803d;
      --warning: #b45309;
      --danger: #dc2626;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 18px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text);
    }

    p {
      margin: 0;
    }

    .intro {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .panel {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .button-stack {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    #goToJobsBtn {
      background: var(--primary);
      color: #ffffff;
    }

    #goToJobsBtn:hover {
      background: var(--primary-hover);
    }

    #readyBtn {
      background: #eef2ff;
      color: var(--primary);
      border: 1px solid #c7d2fe;
    }

    #readyBtn:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      border: 1px solid var(--disabled);
      cursor: not-allowed;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    .steps {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    .steps li + li {
      margin-top: 6px;
    }

    #pageMessage,
    #actionMessage {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.45;
    }

    #pageMessage {
      color: var(--warning);
    }

    #pageMessage.ready {
      color: var(--success);
    }

    #actionMessage {
      color: var(--danger);
      min-height: 18px;
    }
  </style>
</head>

<body>
  <h1>SpaceOne LinkedIn Job Scraper</h1>
  <p class="intro">by Alok R. Thakur</p>
  <p class="intro">Use this extension on LinkedIn job search results pages.</p>

  <section class="panel">
    <div class="button-stack">
      <button id="goToJobsBtn" type="button">Go to LinkedIn Jobs</button>
      <button id="readyBtn" type="button" disabled>Ready to Scrape</button>
    </div>

    <span class="label">Before scraping</span>
    <ol class="steps">
      <li>Sign in to LinkedIn.</li>
      <li>Search for a job title or role.</li>
      <li>Apply your preferred filters.</li>
      <li>Click <strong>Ready to Scrape</strong> on the results page.</li>
    </ol>

    <p id="pageMessage">Checking page...</p>
    <p id="actionMessage"></p>
  </section>

  <script src="content_script_files.js"></script>
  <script src="popup_state.js"></script>
  <script src="popup.js"></script>
</body>
</html>
